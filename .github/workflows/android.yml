name: Build Android APK
on:
  push:
    branches: ['**']
  workflow_dispatch:
jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
      - uses: actions/upload-artifact@v4
        with:
          name: balam-crm-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - name: Comment APK download link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Debug APK built successfully!**\n\nDownload: Go to [Actions → this run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) and download the \`balam-crm-debug-*\` artifact.`
            })
